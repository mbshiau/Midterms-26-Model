services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forecast
      POSTGRES_PASSWORD: forecast
      POSTGRES_DB: pa_gov_forecast
    ports:
      - "5432:5432"
    volumes:
      - pa_gov_forecast_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast -d pa_gov_forecast"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://forecast:forecast@db:5432/pa_gov_forecast
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pa_gov_forecast_data:
